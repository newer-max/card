<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由卡片白板 (组件化版)</title>
    <!-- 引入全局样式 -->
    <link rel="stylesheet" href="styles/global.css">
    <!-- 引入组件样式 -->
    <link rel="stylesheet" href="components/Card/card.css">
    <link rel="stylesheet" href="components/Toolbar/toolbar.css">
    <link rel="stylesheet" href="components/Drawer/drawer.css">
</head>
<body>

    <div class="toolbar">
        <button class="primary" id="btn-add">
            <span>✨</span> 新建便利贴
        </button>
        <button class="secondary" id="btn-clear">
            <span>🗑️</span> 清空
        </button>
    </div>

    <!-- 右上角悬浮抽屉菜单 -->
    <div class="drawer-menu">
        <div class="drawer-toggle">◀</div>
        <div class="drawer-content">
            <button class="drawer-btn" id="btn-export">
                <span>💾</span> 导出备份
            </button>
            <button class="drawer-btn" id="btn-import">
                <span>📂</span> 导入备份
            </button>
        </div>
    </div>

    <input type="file" id="importFile" style="display: none" accept=".json">

    <div id="board"></div>

    <!-- 使用 type="module" 启用 ES6 模块支持 -->
    <script type="module">
        import { Card } from './components/Card/card.js';

        // --- 全局状态 ---
        let zIndexCounter = 1;
        let panX = 0;
        let panY = 0;
        let scale = 1;
        window.currentScale = scale; // 暴露给 Card 组件使用

        // --- 核心功能：画布操作 ---
        function updateCanvas() {
            const board = document.getElementById('board');
            const body = document.body;
            board.style.transform = `scale(${scale}) translate(${panX}px, ${panY}px)`;
            body.style.backgroundSize = `${20 * scale}px ${20 * scale}px`;
            body.style.backgroundPosition = `${panX * scale}px ${panY * scale}px`;
            window.currentScale = scale;
        }

        function initCanvasDrag() {
            const body = document.body;
            let isPanning = false;
            let startX, startY, startPanX, startPanY;

            document.addEventListener('mousedown', (e) => {
                if (e.target.closest('.card') || e.target.closest('button') || e.target.closest('.drawer-menu')) return;
                if (e.ctrlKey) return;

                isPanning = true;
                body.classList.add('grabbing');
                startX = e.clientX;
                startY = e.clientY;
                startPanX = panX;
                startPanY = panY;
            });

            document.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                // 拖拽画布本身不需要除以 scale，因为我们是在移动视口
                // 等等，之前的逻辑里，panX 是平移量，translate 在 scale 之后应用？
                // 在 CSS: scale() translate()
                // 如果 panX 是逻辑坐标，那么视觉位移 = panX * scale
                // 我们希望视觉位移 = 鼠标位移
                // 所以 panX * scale = mouseDelta -> panX = mouseDelta / scale
                const dx = (e.clientX - startX) / scale;
                const dy = (e.clientY - startY) / scale;
                panX = startPanX + dx;
                panY = startPanY + dy;
                updateCanvas();
            });

            document.addEventListener('mouseup', () => {
                isPanning = false;
                body.classList.remove('grabbing');
                saveToStorage();
            });

            document.addEventListener('wheel', (e) => {
                if (e.target.tagName.toLowerCase() === 'textarea' && !e.ctrlKey) return;
                e.preventDefault();

                if (e.ctrlKey) {
                    const delta = -e.deltaY * 0.001;
                    scale = Math.min(Math.max(scale + delta, 0.1), 5);
                } else {
                    panY -= e.deltaY / scale;
                    panX -= e.deltaX / scale;
                }
                updateCanvas();
                clearTimeout(window.saveTimer);
                window.saveTimer = setTimeout(saveToStorage, 500);
            }, { passive: false });
        }

        // --- 核心功能：卡片管理 ---
        function addCard(data = null) {
            const board = document.getElementById('board');
            let x, y, content, color, zIndex;

            if (data) {
                x = parseFloat(data.left); // 去掉 px
                y = parseFloat(data.top);
                zIndex = data.zIndex;
                content = data.content;
                color = data.color;
            } else {
                // 新建
                x = (window.innerWidth / 2 - 100) / scale - panX;
                y = (window.innerHeight / 2 - 75) / scale - panY;
                x += (Math.random() - 0.5) * 60;
                zIndex = zIndexCounter++;
            }

            const card = new Card(x, y, zIndex, content, color);
            board.appendChild(card.element);
            
            if (!data) saveToStorage();
        }

        function clearAll() {
            if(confirm('确定要清空所有卡片吗？')) {
                document.getElementById('board').innerHTML = '';
                saveToStorage();
            }
        }

        // --- 数据持久化 ---
        function saveToStorage() {
            const cards = [];
            document.querySelectorAll('.card').forEach(el => {
                const textarea = el.querySelector('textarea');
                const header = el.querySelector('.card-header');
                cards.push({
                    left: el.style.left,
                    top: el.style.top,
                    width: el.style.width,
                    height: el.style.height,
                    zIndex: el.style.zIndex,
                    content: textarea.value,
                    color: header.style.backgroundColor
                });
            });
            const canvasState = { panX, panY, scale };
            localStorage.setItem('sticky_notes_data_v2', JSON.stringify(cards)); // 用个新key避免冲突
            localStorage.setItem('sticky_canvas_state_v2', JSON.stringify(canvasState));
        }

        function loadFromStorage() {
            const savedCanvas = localStorage.getItem('sticky_canvas_state_v2');
            if (savedCanvas) {
                const state = JSON.parse(savedCanvas);
                panX = state.panX || 0;
                panY = state.panY || 0;
                scale = state.scale || 1;
                updateCanvas();
            }

            const savedCards = localStorage.getItem('sticky_notes_data_v2');
            if (savedCards) {
                const cardsData = JSON.parse(savedCards);
                if (cardsData.length > 0) {
                    cardsData.forEach(data => addCard(data));
                    const maxZ = Math.max(...cardsData.map(c => parseInt(c.zIndex) || 1));
                    zIndexCounter = maxZ + 1;
                }
            }
        }

        // --- 导入导出 ---
        function exportData() {
            const cards = localStorage.getItem('sticky_notes_data_v2');
            const canvas = localStorage.getItem('sticky_canvas_state_v2');
            if (!cards && !canvas) return alert('没有数据');
            
            const blob = new Blob([JSON.stringify({
                cards: JSON.parse(cards || '[]'),
                canvas: JSON.parse(canvas || '{}')
            }, null, 2)], { type: 'application/json' });
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm(`导入 ${data.cards.length} 张卡片？`)) {
                        localStorage.setItem('sticky_notes_data_v2', JSON.stringify(data.cards));
                        localStorage.setItem('sticky_canvas_state_v2', JSON.stringify(data.canvas));
                        document.getElementById('board').innerHTML = '';
                        loadFromStorage();
                    }
                } catch(err) { alert('导入失败'); }
            };
            reader.readAsText(file);
        }

        // --- 初始化绑定 ---
        document.getElementById('btn-add').onclick = () => addCard();
        document.getElementById('btn-clear').onclick = clearAll;
        document.getElementById('btn-export').onclick = exportData;
        document.getElementById('btn-import').onclick = () => document.getElementById('importFile').click();
        document.getElementById('importFile').onchange = (e) => importData(e.target.files[0]);

        // 监听来自 Card 组件的保存请求
        window.addEventListener('save-data', saveToStorage);
        
        // 启动
        initCanvasDrag();
        loadFromStorage();

    </script>
</body>
</html>
